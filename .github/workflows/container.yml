name: Publish HomeOps container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check public artifact privacy
        run: scripts/check-public-artifact.sh

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ghcr.io/${{ github.repository_owner }}/homeops-ai
          tags: |
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/homeops-ai@${{ steps.build.outputs.digest }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Record immutable image reference
        run: echo "ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/homeops-ai@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
